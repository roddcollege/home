<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Dashboard</title>
	<link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div class="header-container">
        <h1>World Soccer Cup Qualifiers</h1>
        <div class="subtitle">DETERMINISTIC INTANGIBLES ENGINE</div>
        
        <div class="top-actions">
            <button class="icon-btn" onclick="forecastMatches()" title="Auto-Forecast Remaining">🔮</button>
            <button id="syncButton" class="icon-btn" onclick="syncLiveData()" title="Sync Match Data">🔄</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('bracket')">Knockouts</button>
        <button class="tab-btn" onclick="showTab('groups')">Group Stages</button>
		<button class="tab-btn" onclick="showTab('superstars')">Superstars</button>
    </div>

    <div id="bracket" class="tab-content active">
        <div class="bracket-wrapper">
            <div class="bracket-title">KNOCKOUT STAGES</div>
            <div class="symmetric-bracket" id="bracket-render-target">
                </div>
        </div>
    </div>

    <div id="groups" class="tab-content">
        <div class="group-grid" id="group-grid-container"></div>
    </div>
	
	<div id="superstars" class="tab-content">
    <h2 style="text-align: center; color: var(--accent); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px;">Tournament Superstars</h2>
    <div class="superstar-masonry" id="superstar-render-target">
        </div>
	</div>

    <div id="tunerModal" class="modal">
        <div class="modal-content" style="max-width: 500px; padding: 20px; margin: 5% auto;">
            <span class="close" onclick="closeTunerModal()">&times;</span>
            <h2 id="tunerModalTitle" style="color:var(--text-main); margin: 0 0 15px 0; font-size: 1.4rem;">Tune Intangibles</h2>
            
            <input type="hidden" id="tuner-active-team">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;">
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <label style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; font-weight:bold;">Base Elo</label>
                    <input type="number" id="tune-elo" oninput="updateTunerCalc()" style="background: var(--bg-color); border: 1px solid var(--border-color); color: #fff; padding: 8px; border-radius: 6px; font-size: 1rem; outline: none;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <label style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; font-weight:bold;">Goal Diff</label>
                    <input type="number" id="tune-gd" value="0" oninput="updateTunerCalc()" style="background: var(--bg-color); border: 1px solid var(--border-color); color: #fff; padding: 8px; border-radius: 6px; font-size: 1rem; outline: none;">
                </div>
                <div style="grid-column: span 2;">
                    <label style="display:flex; align-items:center; gap:8px; color: var(--text-muted); font-weight:bold; font-size: 0.9rem; cursor: not-allowed;">
                        <input type="checkbox" id="tune-host" disabled style="width:16px; height:16px; accent-color:var(--accent); cursor: not-allowed;">
                        Host Nation Bias (+50)
                    </label>
                </div>
                <div style="grid-column: span 2; display: flex; flex-direction: column; gap: 4px;">
                    <label style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; display: flex; justify-content: space-between; font-weight:bold;">Historical Pedigree (0-5) <span id="val-ped" style="color:var(--accent);"></span></label>
                    <input type="range" id="tune-ped" min="0" max="5" oninput="updateTunerCalc()" style="accent-color: var(--accent); cursor: pointer;">
                </div>
                <div style="grid-column: span 2; display: flex; flex-direction: column; gap: 4px;">
                    <label style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; display: flex; justify-content: space-between; font-weight:bold;">Superstar Clutch (1-5) <span id="val-star" style="color:var(--accent);"></span></label>
                    <input type="range" id="tune-star" min="1" max="5" oninput="updateTunerCalc()" style="accent-color: var(--accent); cursor: pointer;">
                </div>
                <div style="grid-column: span 2; display: flex; flex-direction: column; gap: 4px;">
                    <label style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; display: flex; justify-content: space-between; font-weight:bold;">Commercial Bias (1-5) <span id="val-comm" style="color:var(--accent);"></span></label>
                    <input type="range" id="tune-comm" min="1" max="5" oninput="updateTunerCalc()" style="accent-color: var(--accent); cursor: pointer;">
                </div>
            </div>
            
            <div id="tuner-results-panel" style="background: #0e1219; border-radius: 8px; padding: 15px; border-left: 4px solid var(--accent);">
                </div>

            <button class="save-btn" id="tuner-save-btn" onclick="applyTunerChanges()" style="margin-top:15px; padding: 12px; background-color: var(--accent); color: #000;">
                Inject into Engine
            </button>
        </div>
    </div>

    <div id="scoreModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalGroupTitle" style="color:var(--text-main); margin-top:0;">Edit Group Scores</h2>
            <div id="modalMatchesContainer"></div>
            <button class="save-btn" onclick="saveScores()">Save & Recalculate</button>
        </div>
    </div>

    <script src="engine.js?v=2"></script>

</body>
</html>
