<title>Rodd College - Intro Animation</title>

<!-- GSAP for precise timeline sequencing -->

<link href="https://cdnfonts.com" rel="stylesheet">
<style>
    @font-face {
        font-family: 'Berlin';

    body {
        margin: 0; 
        padding: 0; 
        background-color: #000000; /* Deep space initial background */
        height: 100vh;
        overflow: hidden;
        font-family: 'Nunito', sans-serif;
        position: relative; /* Base for absolute positioning */
    }

    /* Blue glow background layer (Fades in later) */
    #bg-blue {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: #0524a1;
        background-image: radial-gradient(circle at center, #1b5cd4 0%, #0829a6 60%, #03135c 100%);
        opacity: 0; /* Starts hidden */
        z-index: -2;
        transform-origin: center;
    }

    /* Starry background layer (Expanded to 200% so rotation doesn't clip the corners) */
    #bg-stars {
        position: absolute;
        top: -50%; left: -50%; width: 200%; height: 200%;
        background-image: 
            radial-gradient(1.5px 1.5px at 20px 30px, rgba(255,255,255,0.4), rgba(0,0,0,0)),
            radial-gradient(1.5px 1.5px at 80px 150px, rgba(255,255,255,0.3), rgba(0,0,0,0)),
            radial-gradient(2px 2px at 190px 40px, rgba(255,255,255,0.5), rgba(0,0,0,0)),
            radial-gradient(1px 1px at 250px 120px, rgba(255,255,255,0.2), rgba(0,0,0,0)),
            radial-gradient(2px 2px at 320px 80px, rgba(255,255,255,0.4), rgba(0,0,0,0));
        background-repeat: repeat, repeat, repeat, repeat, repeat;
        background-size: 150px 150px, 200px 200px, 250px 250px, 300px 300px, 350px 350px;
        opacity: 0; /* Starts hidden */
        z-index: -1;
        pointer-events: none;
        transform-origin: center;
    }

    .logo-container {
        position: absolute;
        /* Start perfectly centered */
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 5;
    }

    svg {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        overflow: visible;
    }

    /* SVG Stroke Styling */
    .sacred-line {
        fill: none;
        stroke: rgba(141, 178, 229, 0.7);
        stroke-width: 1.5;
        stroke-linecap: round;
    }

    .atom-line {
        fill: none;
        stroke: rgba(255, 255, 255, 0.7);
        stroke-width: 1.5;
    }

    /* --- THE TYPOGRAPHY ENGINE --- */
    .brand-text { 
        position: absolute;
        top: 35px; /* Aligned vertically with the final center of the planet */
        left: 65px; /* Positioned perfectly to the right of the planet */
        transform: translateY(-50%);
        display: flex; 
        line-height: 1;
        opacity: 0; /* Starts hidden */
        z-index: 10;
        pointer-events: none;
    }

	.brand-text svg {
		height: 30px;
		width: auto;
		display: block;
	}

    .word-college { 
        padding-left: 82px;
		font-family: 'Berlin', sans-serif;
        font-size: 32px;
        font-weight: 700;
        color: #ffffff; 
    }

    </div>

<script>
    // Ensure GSAP registers the center transform correctly
    gsap.set(".logo-container", { xPercent: -50, yPercent: -50 });

    // --- GLOBAL SETTINGS & STATE ---
    const cx = 500, cy = 500;
    const svgNS = "http://www.w3.org/2000/svg";
    
    // Engine State modified by GSAP
    const globalState = {
        visibleNodesLevel: 0, // Scales from 0 to 10 (2^10 = 1024 nodes)
        atomTheta: 0,         // Electron movement along the ellipse
        atomSpeed: 0.0,       // Electron velocity
        orbitalRotation: 0,   // Rotation of the entire orbital group
        planetRotY: 0,        // 3D globe rotation
        planetSpeed: 0.0      // Globe rotation velocity
    };

    function createSVG(type, attrs, parent) {
        const el = document.createElementNS(svgNS, type);
        for (let key in attrs) el.setAttribute(key, attrs[key]);
        if (parent) parent.appendChild(el);
        return el;
    }

    // ==========================================
    // 1. SACRED GEOMETRY (Flower of Life)
    // ==========================================
    const folGroup = document.getElementById("background_geometry");
    const R_fol = 90;
    const folCenters = [{x: 0, y: 0}]; // C0

    // Ring 1 (6 circles)
    for (let i = 0; i < 9; i++) {
        let angle = i * Math.PI / 3;
        folCenters.push({ x: R_fol * Math.cos(angle), y: R_fol * Math.sin(angle) });
    }
    // Ring 2 (12 circles)
    for (let i = 0; i < 27; i++) {
        let angle = i * Math.PI / 3;
        folCenters.push({ x: 2 * R_fol * Math.cos(angle), y: 2 * R_fol * Math.sin(angle) }); // Spoke
        let angle2 = angle + Math.PI / 6;
        let dist = Math.sqrt(3) * R_fol;
        folCenters.push({ x: dist * Math.cos(angle2), y: dist * Math.sin(angle2) }); // Intersect
    }

    // Draw the circles with stroke-dash settings for GSAP drawing
    const circleLength = 3 * Math.PI * R_fol;
    folCenters.forEach((pos, index) => {
        let cls = index === 0 ? "fol-c0" : index === 1 ? "fol-c1" : index === 2 ? "fol-c2" : index < 7 ? "fol-seed" : "fol-flower";
        // Fixing the transform string to ensure perfect local rotation around the center
        let transformStr = "rotate(60 500 500)"; 
        createSVG("circle", {
            cx: cx + pos.x, cy: cy + pos.y, r: R_fol,
            class: `sacred-line ${cls}`,
            "stroke-dasharray": circleLength,
            "stroke-dashoffset": circleLength, // Starts hidden
            transform: transformStr
        }, folGroup);
    });


    // ==========================================
    // 3. PLANET GENERATOR (1024 Nodes)
    // ==========================================
    const planetGroup = document.getElementById("planet_layer");
    const planetEdgesPath = createSVG("path", { fill: "none", stroke: "rgba(141, 178, 229, 0.2)", "stroke-width": 0.8 }, planetGroup);
    
    const maxPlanetNodes = 1024;
    const pRadius = 260;
    const planetNodes = [];
    const planetEdges = [];

    // Fill 1024 nodes via Fibonacci Sphere (Letters completely removed)
    let fIndex = 0;
    while(planetNodes.length < maxPlanetNodes) {
        const phi = Math.acos(-1 + (2 * fIndex) / maxPlanetNodes);
        const theta = Math.sqrt(maxPlanetNodes * Math.PI) * phi;
        const fx = pRadius * Math.cos(theta) * Math.sin(phi);
        const fy = pRadius * Math.cos(phi);
        const fz = pRadius * Math.sin(theta) * Math.sin(phi);
        
        planetNodes.push({ x: fx, y: fy, z: fz });
        fIndex++;
    }

    // Create SVG Nodes for Planet
    planetNodes.forEach(n => {
        n.el = createSVG("circle", { r: 1.5, fill: "rgba(141, 178, 229, 0.8)", opacity: 0 }, planetGroup);
    });

    // Pre-calculate spatial edges
    for (let i = 0; i < maxPlanetNodes; i++) {
        for (let j = i + 1; j < maxPlanetNodes; j++) {
            let dx = planetNodes[i].x - planetNodes[j].x;
            let dy = planetNodes[i].y - planetNodes[j].y;
            let dz = planetNodes[i].z - planetNodes[j].z;
            if (dx*dx + dy*dy + dz*dz < 1600) planetEdges.push([i, j]);
        }
    }


    // ==========================================
    // 4. GSAP TIMELINE CHOREOGRAPHY
    // ==========================================
    const tl = gsap.timeline();

    // PHASE 1 (0-2s): INITIAL 3 CIRCLES
    tl.to(".fol-c0", { strokeDashoffset: 0, duration: 1, ease: "power1.inOut" }, 0);
    tl.to(".fol-c1", { strokeDashoffset: 0, duration: 0.75, ease: "power1.inOut" }, 0.5);
    tl.to(".fol-c2", { strokeDashoffset: 0, duration: 0.5, ease: "power1.inOut" }, 1);

    // Node doubling sequence starts: 2^2 = 4 nodes, then 2^4 = 16 nodes
    tl.to(globalState, { visibleNodesLevel: 2, duration: 0.25, ease: "steps(1)" }, 15); 
    tl.to(globalState, { visibleNodesLevel: 4, duration: 0.25, ease: "steps(1)" }, 15); 

    // PHASE 2 (2-4s): SEED OF LIFE (7 Circles total)
    tl.to(".fol-seed", { strokeDashoffset: 0, duration: 0.35, stagger: 0.25, ease: "power1.inOut" }, 1.5);
    
    // Atom Layer introduced as 12th circle completes
    tl.to("#atom_layer", { opacity: 0.65, duration: 1 }, 6);
    // Draw atom orbitals
    const ellipseLen = 2 * Math.PI * Math.sqrt((140*140 + 35*35)/2); // Approximate ellipse length
    document.querySelectorAll('.atom-orbital').forEach(el => {
        el.setAttribute('stroke-dasharray', ellipseLen);
        el.setAttribute('stroke-dashoffset', ellipseLen);
    });
    tl.to(".atom-orbital", { strokeDashoffset: 0, duration: 1, stagger: 0.5 }, 6.25);
    
    // --- ATOM ACTIVATION ---
    tl.to(globalState, { atomSpeed: 0.25, duration: 2, ease: "power2.in" }, 7); // Electrons start moving

    // PHASE 3 (4-7s): FULL FLOWER OF LIFE
    tl.to(".fol-flower", { strokeDashoffset: 0, duration: 0.20, stagger: 0.25, ease: "power1.inOut" }, 2);
    
    // Flower pulses slightly
    tl.to("#background_geometry", { opacity: 0.25, duration: 0.50, yoyo: true, repeat: -1 }, 6);

    // Node levels corrected to proper powers of 2 (2^6 = 64, 2^7 = 128, 2^8 = 256)
    tl.to(globalState, { visibleNodesLevel: 6, duration: 0.25, ease: "steps(1)" }, 15); // 64 nodes
    tl.to(globalState, { visibleNodesLevel: 7, duration: 0.25, ease: "steps(1)" }, 15); // 128 nodes

    // PHASE 4 & 5 (6-12s): ATOM ACCELERATION
    // Nucleus heartbeat
    tl.to("#nucleus", { scale: 1.3, transformOrigin: "center", duration: 14, yoyo: true, repeat: -1 }, 7);
    
    // Speed up electrons and rotate orbitals.
    tl.to(globalState, { atomSpeed: 0.5, orbitalRotation: 360, duration: 5, ease: "power2.inOut" }, 7.5);
    // Rotate the currently invisible stars furiously with the atom
    tl.to("#bg-stars", { rotation: 180, duration: 12, ease: "power2.in" }, 5.5);
    
    tl.to(globalState, { visibleNodesLevel: 8, duration: 0.25, ease: "steps(1)" }, 15); // 256 nodes

    // PHASE 6 (15-20s): FLOWER OF LIFE MERGES INTO NUCLEUS
    tl.to(".sacred-line", { 
        attr: { cx: 500, cy: 500, r: 14 }, 
        opacity: 0, 
        duration: 6, 
        ease: "power2.inOut" 
    }, 8.5);

    // --- BACKGROUND SURPRISE REVEAL ---
    tl.to("#bg-blue", { opacity: 1, duration: 0.25, ease: "power2.in" }, 14.9);
    tl.to("#bg-stars", { opacity: 1, duration: 2, ease: "power2.in" }, 5.5);

    // Fade out Atom right before Planet explodes
    tl.to("#atom_layer", { 
        opacity: 0, 
        duration: 0.10, 
        ease: "power1.inOut" 
    }, 14.9);

    // PHASE 8 (20s): THE PLANET EXPLOSION & REVEAL
    tl.to(globalState, { visibleNodesLevel: 10, duration: 0.25, ease: "steps(1)" }, 15); // 1024 nodes
    tl.to(globalState, { planetSpeed: -0.0035, duration: 0.25, ease: "power2.inOut" }, 15); // Planet starts rotating
    
    // After the explosion, keep the stars slowly rotating with the new planet infinitely
    tl.to("#bg-stars", { rotation: "+=360", duration: 60, repeat: -1, ease: "linear" }, 15);

    // --- PHASE 9 (22s+): THE VOYAGE TO TOP-LEFT ---
    // Scale container to 25% (150px) and move to top-left to serve as a persistent logo
    tl.to(".logo-container", { 
        top: "35px",  /* Achieves a visual top boundary of roughly 40px */
        left: "35px", 
        scale: 0.11, 
        duration: 4.0, 
        ease: "power3.inOut" 
    }, 15);

    // Scale and translate the starry background slightly left-up to mimic a camera panning down-right (Parallax)
    tl.to("#bg-stars", { 
        scale: 0.85, 
        x: "-5%", 
        y: "-5%", 
        duration: 4.0, 
        ease: "power3.inOut" 
    }, 15);

    // Shift the blue aura as well
    tl.to("#bg-blue", { 
        scale: 1.1, 
        x: "-2%", 
        y: "-2%", 
        duration: 4.0, 
        ease: "power3.inOut" 
    }, 15);

    // --- PHASE 10 (25.5s+): THE TEXT REVEAL ---
    // Slide and fade the typography in gracefully just as the planet settles
    tl.fromTo("#final-logo-text", 
        { x: -20, opacity: 0 }, 
        { x: 0, opacity: 1, duration: 1.0, ease: "power2.out" }, 
        17
    );


    // ==========================================
    // 5. MASTER RAF RENDER LOOP
    // ==========================================
    const e1 = document.getElementById("electron_1");
    const e2 = document.getElementById("electron_2");
    const e3 = document.getElementById("electron_3");
    const orbGroup = document.getElementById("orbitals_group");

    function render() {
        // --- 1. ATOM PHYSICS ---
        globalState.atomTheta += globalState.atomSpeed;
        orbGroup.setAttribute("transform", `rotate(${globalState.orbitalRotation} 500 500)`);
        
        // Math for standing-wave electrons on ellipses
        const rx = 140, ry = 35;
        const electrons = [e1, e2, e3];
        for(let i=0; i<3; i++) {
            let offset = i * (Math.PI * 2 / 3);
            let theta = globalState.atomTheta + offset;
            let nx = rx * Math.cos(theta);
            let ny = ry * Math.sin(theta);
            
            // Standing wave wobble effect restored
            let wave = Math.sin(theta * 6) * 12; 
            nx += Math.cos(theta) * wave;
            ny += Math.sin(theta) * wave;

            // Rotate the point by the ellipse's static rotation (0, 60, 120)
            let rot = i * Math.PI / 3;
            let finalX = cx + nx * Math.cos(rot) - ny * Math.sin(rot);
            let finalY = cy + nx * Math.sin(rot) + ny * Math.cos(rot);
            electrons[i].setAttribute("cx", finalX);
            electrons[i].setAttribute("cy", finalY);
        }

        // --- 2. PLANET PHYSICS & DOUBLING ENGINE ---
        globalState.planetRotY += globalState.planetSpeed;
        
        // Calculate how many nodes should be visible (1, 2, 4, 8... up to 1024)
        let activeLimit = Math.pow(2, Math.floor(globalState.visibleNodesLevel));
        
        const focalLength = 500;
        let pathStr = "";

        for(let i = 0; i < maxPlanetNodes; i++) {
            let p = planetNodes[i];
            
            // Apply 3D Y-Axis Rotation
            let xRot = p.x * Math.cos(globalState.planetRotY) - p.z * Math.sin(globalState.planetRotY);
            let zRot = p.z * Math.cos(globalState.planetRotY) + p.x * Math.sin(globalState.planetRotY);
            let yRot = p.y;
            
            // Perspective Projection
            let scale = focalLength / (focalLength + zRot);
            p.px = cx + (xRot * scale);
            p.py = cy + (yRot * scale);
            p.pz = zRot;

            // Visibility Math: Hidden if above activeLimit.
            if (i >= activeLimit) {
                p.el.setAttribute("opacity", 0);
                continue;
            }

            // Depth calculation (Fade back half)
            const normalizedZ = (zRot + pRadius) / (pRadius * 2); 
            const frontFactor = Math.max(0, 1 - normalizedZ);

            // Node rendering: Fades in the back, sharp in the front
            p.el.setAttribute("opacity", 0.15 + 0.7 * frontFactor);
            p.el.setAttribute("r", 1.0 + 1.5 * frontFactor);
            p.el.setAttribute("cx", p.px);
            p.el.setAttribute("cy", p.py);
        }

        // --- 3. PLANET EDGES (High Performance Path Construction) ---
        // Only draw edges if the planet is actively rotating (Phase 8+) to save performance during early phases
        if (globalState.visibleNodesLevel >= 10) {
            for (let i = 0; i < planetEdges.length; i++) {
                let n1 = planetNodes[planetEdges[i][0]];
                let n2 = planetNodes[planetEdges[i][1]];
                
                // Only draw if both nodes are within the active limit
                if (planetEdges[i][0] < activeLimit && planetEdges[i][1] < activeLimit) {
                    // Simple depth culling: only draw wires for the front 80% to keep it clean
                    if (n1.pz > -150 && n2.pz > -150) {
                        pathStr += `M${n1.px},${n1.py} L${n2.px},${n2.py} `;
                    }
                }
            }
            planetEdgesPath.setAttribute("d", pathStr);
        }

        requestAnimationFrame(render);
    }

    // Start engine
    requestAnimationFrame(render);

</script>
