<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodd College - Intro Animation</title>

    <script>
        (function() {
            const targetUrl = 'https://rodd.co/business/';
            
            // 1. Mobile Detection (Checks User Agent and Screen Width)
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
            
            // 2. Returning User Detection
            const hasSeenIntro = localStorage.getItem('roddIntroSeen') === 'true';

            if (isMobile || hasSeenIntro) {
                // Use .replace() so the intro doesn't get stuck in their "Back" button history
                window.location.replace(targetUrl);
            } else {
                // It's a first-time desktop user. Mark them so they don't see it next time.
                localStorage.setItem('roddIntroSeen', 'true');
            }
        })();
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            margin: 0; 
            padding: 0; 
            background-color: #000000; /* Deep space initial background */
            height: 100vh;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            position: relative; 
        }

        /* CodyHouse Loading Bar */
        #cd-loading-bar {
            position: fixed;
            z-index: 9999;
			bottom: 0;
            left: 0;
            width: 100vh;
            height: 6px;
            background-color: #cccccc;
            transform-origin: bottom;
            transform: scaleY(0);
            pointer-events: none;
        }

        /* Wrap content to allow CodyHouse slide effect */
        #cd-main {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Blue glow background layer (Fades in later) */
        #bg-blue {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0524a1;
            background-image: radial-gradient(circle at center, #1b5cd4 0%, #0829a6 60%, #03135c 100%);
            opacity: 0; /* Starts hidden */
            z-index: -2;
            transform-origin: center;
        }

        /* Starry background layer */
        #bg-stars {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(1.5px 1.5px at 20px 30px, rgba(255,255,255,0.4), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 80px 150px, rgba(255,255,255,0.3), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 190px 40px, rgba(255,255,255,0.5), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 250px 120px, rgba(255,255,255,0.2), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 320px 80px, rgba(255,255,255,0.4), rgba(0,0,0,0));
            background-repeat: repeat, repeat, repeat, repeat, repeat;
            background-size: 150px 150px, 200px 200px, 250px 250px, 300px 300px, 350px 350px;
            opacity: 0; 
            z-index: -1;
            pointer-events: none;
            transform-origin: center;
        }

        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: visible;
        }

        .sacred-line {
            fill: none;
            stroke: rgba(141, 178, 229, 0.7);
            stroke-width: 1.5;
            stroke-linecap: round;
        }

        .atom-line {
            fill: none;
            stroke: rgba(255, 255, 255, 0.7);
            stroke-width: 1.5;
        }


        /* Skip Button styling */
        .skip-btn {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            color: rgba(255,255,255,0.5);
            z-index: 100;
            font-family: 'Nunito', sans-serif;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            font-weight: bold;
            transition: color 0.2s;
        }
        .skip-btn:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="cd-loading-bar"></div>

    <main id="cd-main">
        <div id="bg-blue"></div>
        <div id="bg-stars"></div>

        <div class="logo-container" id="logo-container">
            <svg id="mainSvg" viewBox="0 0 1000 1000">
                <defs>
                    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%" color-interpolation-filters="sRGB">
                        <feGaussianBlur stdDeviation="12" result="blur" />
                        <feComponentTransfer in="blur" result="glow">
                            <feFuncA type="linear" slope="2.0" />
                        </feComponentTransfer>
                        <feMerge>
                            <feMergeNode in="glow"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <g id="planet_layer"></g>
                <g id="background_geometry"></g>
                <g id="atom_layer" opacity="0">
                    <circle id="nucleus" cx="500" cy="500" r="14" fill="#ffffff" filter="url(#coreGlow)" />
                    <g id="orbitals_group">
                        <ellipse class="atom-line atom-orbital" cx="500" cy="500" rx="140" ry="35" transform="rotate(0 500 500)" />
                        <ellipse class="atom-line atom-orbital" cx="500" cy="500" rx="140" ry="35" transform="rotate(60 500 500)" />
                        <ellipse class="atom-line atom-orbital" cx="500" cy="500" rx="140" ry="35" transform="rotate(120 500 500)" />
                    </g>
                    <circle id="electron_1" cx="500" cy="500" r="6" fill="#8da8f9" />
                    <circle id="electron_2" cx="500" cy="500" r="6" fill="#8da8f9" />
                    <circle id="electron_3" cx="500" cy="500" r="6" fill="#8da8f9" />
                </g>
            </svg>
        </div>

        <a href="https://rodd.co/business/" id="skip-intro" class="skip-btn" onclick="goToWelcome(event)">Skip Intro &rarr;</a>
    </main>

<script>
    // --- GSAP PAGE TRANSITION LOGIC ---
    let introRafId;
    
    async function goToWelcome(e) {
        if (e) e.preventDefault();
        const targetUrl = e ? e.currentTarget.href : 'https://rodd.co/business/';
        
        if (window.isTransitioning) return;
        window.isTransitioning = true;

        const loadingBar = document.getElementById("cd-loading-bar");
        const currentMain = document.getElementById("cd-main");

        // 1. Loading bar grows UP (CodyHouse style)
        gsap.to(loadingBar, { scaleY: 1, duration: 0.5, ease: "power2.inOut" });

        try {
            // 2. Fetch the next page seamlessly
            const response = await fetch(targetUrl);
            if (!response.ok) throw new Error("Target page fetch failed");
            const html = await response.text();
            
            // 3. Parse target HTML to extract the next #cd-main container
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const newMain = doc.getElementById("cd-main");

            if (!newMain) throw new Error("Target missing #cd-main wrapper");

            // 4. Setup new page off-screen to the right
            newMain.style.position = "absolute";
            newMain.style.top = "0";
            newMain.style.left = "0";
            newMain.style.width = "100%";
            newMain.style.height = "100%";
            newMain.style.transform = "translateX(100%)";
            newMain.style.zIndex = "20";
            // Important for tailwind styling of body taking over the wrapper
            newMain.classList.add("bg-mainBg"); 
            document.body.appendChild(newMain);

            // 5. Animate the Transition
            const tlTrans = gsap.timeline({
				onComplete: () => {
					// Stop Intro Loop & Cleanup
					if (introRafId) cancelAnimationFrame(introRafId);
					currentMain.remove();
					gsap.to(loadingBar, { opacity: 0, duration: 0.3 });
					
					// Push URL to History for seamless SPA feel
					window.history.pushState({path: targetUrl}, '', targetUrl);
					
					// NEW: Manually evaluate scripts from the injected page
					const newScripts = newMain.querySelectorAll('script');
					newScripts.forEach(oldScript => {
						const newScript = document.createElement('script');
						newScript.textContent = oldScript.textContent;
						document.body.appendChild(newScript);
					});

					// Boot up the scripts in the newly injected page
					document.dispatchEvent(new Event('pageTransitionComplete'));
				}
            });

            // The CodyHouse Effect: Old content pushes back slightly, New content sweeps over
            tlTrans.to(currentMain, { scale: 0.95, x: "-10%", opacity: 0, duration: 0.8, ease: "power3.inOut" }, 0.2);
            tlTrans.to(newMain, { x: "0%", duration: 0.8, ease: "power3.inOut" }, 0.2);

        } catch (err) {
            // Safe Fallback: If fetch fails due to CORS or local testing, it still animates out then redirects normally
            console.warn("AJAX Transition fallback due to CORS/Fetch error:", err);
            gsap.to(currentMain, { 
                scale: 0.95, x: "-10%", opacity: 0, duration: 0.8, ease: "power3.inOut",
                onComplete: () => { window.location.href = targetUrl; }
            });
        }
    }


    // --- INTRO ANIMATION TIMELINE LOGIC ---
    gsap.set(".logo-container", { xPercent: -50, yPercent: -50 });

    const cx = 500, cy = 500;
    const svgNS = "http://www.w3.org/2000/svg";
    
    const globalState = {
        visibleNodesLevel: 0, 
        atomTheta: 0,         
        atomSpeed: 0.0,       
        orbitalRotation: 0,   
        planetRotY: 0,        
        planetSpeed: 0.0      
    };

    function createSVG(type, attrs, parent) {
        const el = document.createElementNS(svgNS, type);
        for (let key in attrs) el.setAttribute(key, attrs[key]);
        if (parent) parent.appendChild(el);
        return el;
    }

    const folGroup = document.getElementById("background_geometry");
    const R_fol = 90;
    const folCenters = [{x: 0, y: 0}]; 

    for (let i = 0; i < 9; i++) {
        let angle = i * Math.PI / 3;
        folCenters.push({ x: R_fol * Math.cos(angle), y: R_fol * Math.sin(angle) });
    }
    for (let i = 0; i < 27; i++) {
        let angle = i * Math.PI / 3;
        folCenters.push({ x: 2 * R_fol * Math.cos(angle), y: 2 * R_fol * Math.sin(angle) }); 
        let angle2 = angle + Math.PI / 6;
        let dist = Math.sqrt(3) * R_fol;
        folCenters.push({ x: dist * Math.cos(angle2), y: dist * Math.sin(angle2) }); 
    }

    const circleLength = 3 * Math.PI * R_fol;
    folCenters.forEach((pos, index) => {
        let cls = index === 0 ? "fol-c0" : index === 1 ? "fol-c1" : index === 2 ? "fol-c2" : index < 7 ? "fol-seed" : "fol-flower";
        let transformStr = "rotate(60 500 500)"; 
        createSVG("circle", {
            cx: cx + pos.x, cy: cy + pos.y, r: R_fol,
            class: `sacred-line ${cls}`,
            "stroke-dasharray": circleLength,
            "stroke-dashoffset": circleLength, 
            transform: transformStr
        }, folGroup);
    });

    const planetGroup = document.getElementById("planet_layer");
    const planetEdgesPath = createSVG("path", { fill: "none", stroke: "rgba(141, 178, 229, 0.5)", "stroke-width": 1 }, planetGroup);
    
    const maxPlanetNodes = 1024;
    const pRadius = 260;
    const planetNodes = [];
    const planetEdges = [];

    let fIndex = 0;
    while(planetNodes.length < maxPlanetNodes) {
        const phi = Math.acos(-1 + (2 * fIndex) / maxPlanetNodes);
        const theta = Math.sqrt(maxPlanetNodes * Math.PI) * phi;
        const fx = pRadius * Math.cos(theta) * Math.sin(phi);
        const fy = pRadius * Math.cos(phi);
        const fz = pRadius * Math.sin(theta) * Math.sin(phi);
        
        planetNodes.push({ x: fx, y: fy, z: fz });
        fIndex++;
    }

    planetNodes.forEach(n => {
        n.el = createSVG("circle", { r: 1.5, fill: "rgba(141, 178, 229, 1)", opacity: 0 }, planetGroup);
    });

    for (let i = 0; i < maxPlanetNodes; i++) {
        for (let j = i + 1; j < maxPlanetNodes; j++) {
            let dx = planetNodes[i].x - planetNodes[j].x;
            let dy = planetNodes[i].y - planetNodes[j].y;
            let dz = planetNodes[i].z - planetNodes[j].z;
            if (dx*dx + dy*dy + dz*dz < 1600) planetEdges.push([i, j]);
        }
    }

    const tl = gsap.timeline();

    tl.to(".fol-c0", { strokeDashoffset: 0, duration: 1, ease: "power1.inOut" }, 0);
    tl.to(".fol-c1", { strokeDashoffset: 0, duration: 0.75, ease: "power1.inOut" }, 0.5);
    tl.to(".fol-c2", { strokeDashoffset: 0, duration: 0.5, ease: "power1.inOut" }, 1);
    tl.to(globalState, { visibleNodesLevel: 2, duration: 0.25, ease: "steps(1)" }, 15); 
    tl.to(globalState, { visibleNodesLevel: 4, duration: 0.25, ease: "steps(1)" }, 15); 
    tl.to(".fol-seed", { strokeDashoffset: 0, duration: 0.35, stagger: 0.25, ease: "power1.inOut" }, 1.5);
    
    tl.to("#atom_layer", { opacity: 0.65, duration: 1 }, 6);
    const ellipseLen = 2 * Math.PI * Math.sqrt((140*140 + 35*35)/2); 
    document.querySelectorAll('.atom-orbital').forEach(el => {
        el.setAttribute('stroke-dasharray', ellipseLen);
        el.setAttribute('stroke-dashoffset', ellipseLen);
    });
    tl.to(".atom-orbital", { strokeDashoffset: 0, duration: 1, stagger: 0.5 }, 6.25);
    
    tl.to(globalState, { atomSpeed: 0.25, duration: 2, ease: "power2.in" }, 7); 
    tl.to(".fol-flower", { strokeDashoffset: 0, duration: 0.20, stagger: 0.25, ease: "power1.inOut" }, 2);
    tl.to("#background_geometry", { opacity: 0.25, duration: 0.50, yoyo: true, repeat: -1 }, 6);

    tl.to(globalState, { visibleNodesLevel: 6, duration: 0.25, ease: "steps(1)" }, 15); 
    tl.to(globalState, { visibleNodesLevel: 7, duration: 0.25, ease: "steps(1)" }, 15); 

    tl.to("#nucleus", { scale: 1.3, transformOrigin: "center", duration: 14, yoyo: true, repeat: -1 }, 7);
    tl.to(globalState, { atomSpeed: 0.5, orbitalRotation: 360, duration: 5, ease: "power2.inOut" }, 7.5);
    tl.to("#bg-stars", { rotation: 180, duration: 12, ease: "power2.in" }, 5.5);
    
    tl.to(globalState, { visibleNodesLevel: 8, duration: 0.25, ease: "steps(1)" }, 15); 

    tl.to(".sacred-line", { 
        attr: { cx: 500, cy: 500, r: 14 }, 
        opacity: 0, duration: 6, ease: "power2.inOut" 
    }, 8.5);

    tl.to("#bg-blue", { opacity: 1, duration: 0.25, ease: "power2.in" }, 14.9);
    tl.to("#bg-stars", { opacity: 1, duration: 2, ease: "power2.in" }, 5.5);

    tl.to("#atom_layer", { opacity: 0, duration: 0.10, ease: "power1.inOut" }, 14.9);

    tl.to(globalState, { visibleNodesLevel: 10, duration: 0.25, ease: "steps(1)" }, 15); 
    tl.to(globalState, { planetSpeed: -0.0035, duration: 0.25, ease: "power2.inOut" }, 15); 
    
    tl.to("#bg-stars", { rotation: "+=360", duration: 60, repeat: -1, ease: "linear" }, 15);

    tl.to(".logo-container", { 
        top: "35px", left: "65px", scale: 0.11, duration: 4.0, ease: "power3.inOut" 
    }, 15);

    tl.to("#bg-stars", { scale: 0.85, x: "-5%", y: "-5%", duration: 4.0, ease: "power3.inOut" }, 15);
    tl.to("#bg-blue", { scale: 1.1, x: "-2%", y: "-2%", duration: 4.0, ease: "power3.inOut" }, 15);

    tl.fromTo("#final-logo-text", 
        { x: -20, opacity: 0 }, 
        { x: 0, opacity: 1, duration: 1.0, ease: "power2.out" }, 
        17
    );

    // Trigger exact CodyHouse page transition automatically after intro settling
    tl.call(goToWelcome, [], 17);

    const e1 = document.getElementById("electron_1");
    const e2 = document.getElementById("electron_2");
    const e3 = document.getElementById("electron_3");
    const orbGroup = document.getElementById("orbitals_group");

    function render() {
        globalState.atomTheta += globalState.atomSpeed;
        orbGroup.setAttribute("transform", `rotate(${globalState.orbitalRotation} 500 500)`);
        
        const rx = 140, ry = 35;
        const electrons = [e1, e2, e3];
        for(let i=0; i<3; i++) {
            let offset = i * (Math.PI * 2 / 3);
            let theta = globalState.atomTheta + offset;
            let nx = rx * Math.cos(theta);
            let ny = ry * Math.sin(theta);
            
            let wave = Math.sin(theta * 6) * 12; 
            nx += Math.cos(theta) * wave;
            ny += Math.sin(theta) * wave;

            let rot = i * Math.PI / 3;
            let finalX = cx + nx * Math.cos(rot) - ny * Math.sin(rot);
            let finalY = cy + nx * Math.sin(rot) + ny * Math.cos(rot);
            electrons[i].setAttribute("cx", finalX);
            electrons[i].setAttribute("cy", finalY);
        }

        globalState.planetRotY += globalState.planetSpeed;
        let activeLimit = Math.pow(2, Math.floor(globalState.visibleNodesLevel));
        
        const focalLength = 500;
        let pathStr = "";

        for(let i = 0; i < maxPlanetNodes; i++) {
            let p = planetNodes[i];
            
            let xRot = p.x * Math.cos(globalState.planetRotY) - p.z * Math.sin(globalState.planetRotY);
            let zRot = p.z * Math.cos(globalState.planetRotY) + p.x * Math.sin(globalState.planetRotY);
            let yRot = p.y;
            
            let scale = focalLength / (focalLength + zRot);
            p.px = cx + (xRot * scale);
            p.py = cy + (yRot * scale);
            p.pz = zRot;

            if (i >= activeLimit) {
                p.el.setAttribute("opacity", 0);
                continue;
            }

            const normalizedZ = (zRot + pRadius) / (pRadius * 2); 
            const frontFactor = Math.max(0, 1 - normalizedZ);

            p.el.setAttribute("opacity", 0.15 + 0.7 * frontFactor);
            p.el.setAttribute("r", 1.0 + 1.5 * frontFactor);
            p.el.setAttribute("cx", p.px);
            p.el.setAttribute("cy", p.py);
        }

        if (globalState.visibleNodesLevel >= 10) {
            for (let i = 0; i < planetEdges.length; i++) {
                let n1 = planetNodes[planetEdges[i][0]];
                let n2 = planetNodes[planetEdges[i][1]];
                
                if (planetEdges[i][0] < activeLimit && planetEdges[i][1] < activeLimit) {
                    if (n1.pz > -150 && n2.pz > -150) {
                        pathStr += `M${n1.px},${n1.py} L${n2.px},${n2.py} `;
                    }
                }
            }
            planetEdgesPath.setAttribute("d", pathStr);
        }

        introRafId = requestAnimationFrame(render);
    }

    introRafId = requestAnimationFrame(render);

</script>
</body>
</html>
